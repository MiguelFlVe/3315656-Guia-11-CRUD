<!--
1. Estructura HTML mínima
Construyan una interfaz sencilla con:
• Un campo de texto para escribir la tarea.
• Un botón para guardar.
• Una lista donde se muestren las tareas.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía 11</title>
</head>
<body>
    <form action="" novalidate>
        <label for="taskInput">Ingrese la tarea:</label>
        <input type="text" id="taskInput" name="taskName" required>
        <button type="submit" id="saveButton">Guardar</button>
    </form>

    <table>
        <thead id="taskTableHead">
            <tr>
                <th id="taskTableTitleName">Tarea</th>
                <th id="taskTableTitleStatus">Estado</th>
            </tr>
        </thead>
        <tbody id="taskTableBody">
            <!-- Las tareas se agregarán aquí dinámicamente -->

            <tr id="emptyState">
                <td colspan="2"> No hay tareas registradas en este momento </td>
            </tr>
        </tbody>
    </table>

    <script type="module" src="script.js"></script>
</body>
</html>
